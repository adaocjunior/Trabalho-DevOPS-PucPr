name: Integracao

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  testesUnitarios:
    name: "Integracao"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Instalacao de dependencias
        run: pip install -r requirements.txt
      - name: Testes unitarios
        run: pytest

  entrega:
    name: "Docker Hub"
    runs-on: ubuntu-latest
    needs: testesUnitarios  # opcional: garante que este job só rode se o anterior passar
    steps:
      - uses: actions/checkout@v2
      - name: "Login Docker Hub"
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_HUB_SECRET }}
      - name: "QEMU"
        uses: docker/setup-qemu-action@v3
      - name: "Buildx"
        uses: docker/setup-buildx-action@v3
      - name: "Build e push"
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: adaoojunior/devops2026-tarefas:latest